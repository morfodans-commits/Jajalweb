<style>
  :root{
    --paper:#F6F3EC;
    --paper2:#EFEBE0;
    --ink:#13110F;
    --ink2:#1C1A17;
    --red:#FF0000;
    --red-deep:#CC0000;
    --mut:#6F6B62;
    --line:#E0D9CC;
    --space:clamp(20px,5.5vw,80px);
    --maxw:1200px;
    --display:"Anton", Impact, sans-serif;
    --serif:"Archivo", system-ui, sans-serif;
    --hand:"Permanent Marker", cursive;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; overflow-x:clip; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--serif); font-size:17px; line-height:1.6;
    -webkit-font-smoothing:antialiased; overflow-x:clip;
  }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:var(--maxw); margin:0 auto; padding-left:var(--space); padding-right:var(--space); }
  .disp{ font-family:var(--display); font-weight:400; letter-spacing:.01em; line-height:.9; text-transform:uppercase; }
  .label{ font-family:var(--serif); font-weight:800; font-size:clamp(12px,1.5vw,14px); letter-spacing:.14em; text-transform:uppercase; color:var(--red); }

  .mark{ position:absolute; pointer-events:none; overflow:visible; }
  .mark path{ fill:none; stroke:var(--red); stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; }

  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:none; }

  /* TICKER */
  .ticker{ background:var(--ink); overflow:hidden; white-space:nowrap; }
  .ticker-track{ display:inline-block; padding:8px 0; animation:scroll 32s linear infinite; }
  .ticker-track span{ font-family:var(--serif); font-weight:700; font-size:11px; letter-spacing:.1em; color:var(--paper); padding:0 14px; }
  .ticker-track span b{ color:var(--red); }
  @keyframes scroll{ from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* HEADER */
  header{ position:sticky; top:0; z-index:70; background:rgba(246,243,236,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .head-in{ display:flex; align-items:center; justify-content:space-between; height:62px; }
  .h-left, .h-right{ flex:1; display:flex; align-items:center; gap:14px; }
  .h-right{ justify-content:flex-end; }
  .icon-btn{ background:none; border:none; cursor:pointer; color:var(--ink); display:flex; align-items:center; padding:6px; }
  .icon-btn svg{ width:24px; height:24px; }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand img{ width:32px; height:32px; }
  .brand .wm{ font-family:var(--serif); font-weight:800; font-size:18px; letter-spacing:-.01em; text-transform:uppercase; color:var(--ink); line-height:1; }
  .ea-pill{ font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.05em; text-transform:uppercase; background:var(--red); color:#fff; padding:9px 16px; white-space:nowrap; transition:background .15s; }
  .ea-pill:hover{ background:var(--red-deep); }

  /* HERO */
  .hero{ padding:clamp(52px,9vw,120px) 0 clamp(44px,7vw,96px); position:relative; }
  .hero-grid{ display:grid; grid-template-columns:1fr; gap:30px; align-items:center; }
  .hero-eyebrow{ font-family:var(--hand); font-size:clamp(18px,3.5vw,28px); color:var(--red); margin-bottom:14px; }
  .hero h1{ font-family:var(--display); font-size:clamp(50px,12vw,170px); line-height:.84; letter-spacing:.005em; text-transform:uppercase; position:relative; display:inline-block; }
  .hero h1 .ul{ position:absolute; left:-2%; right:-2%; bottom:-.12em; width:104%; height:.22em; }
  .hero-claim{ font-family:var(--display); font-size:clamp(16px,2vw,20px); letter-spacing:.02em; text-transform:uppercase; color:var(--red); margin-top:22px; }
  .hero-sub{ font-size:clamp(16px,2vw,19px); color:var(--ink); max-width:46ch; margin-top:14px; }
  .hero-cta{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-top:32px; }
  .btn{ font-family:var(--serif); font-weight:700; font-size:13px; letter-spacing:.06em; text-transform:uppercase; padding:14px 26px; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:9px; transition:transform .15s, background .15s, color .15s; }
  .btn-red{ background:var(--red); color:#fff; }
  .btn-red:hover{ background:var(--red-deep); }
  .btn-ink{ background:var(--ink); color:var(--paper); }
  .btn-ink:hover{ background:var(--ink2); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--ink); }
  .btn-ghost:hover{ background:var(--ink); color:var(--paper); }
  .hero-logo{ width:clamp(120px,16vw,168px); height:auto; justify-self:start; }
  @media (min-width:860px){
    .hero-grid{ grid-template-columns:1.5fr .8fr; }
    .hero-logo{ justify-self:end; }
  }

  section{ position:relative; }
  .sec-pad{ padding:clamp(48px,8vw,104px) 0; }
  .sec-label{ position:relative; display:inline-block; margin-bottom:clamp(22px,3.5vw,38px); }
  .sec-label .ul{ position:absolute; left:0; bottom:-12px; width:108%; height:14px; }

  /* TEXT BLOCK SECTIONS (Built for Dancers / Why Dancers) */
  .text-block{ max-width:760px; }
  .text-block h2{ font-family:var(--display); font-size:clamp(34px,5.5vw,58px); line-height:1.02; text-transform:uppercase; margin-bottom:22px; }
  .text-block p{ font-size:clamp(17px,2vw,19px); line-height:1.65; color:var(--ink); margin-bottom:16px; }
  .text-block p:last-child{ margin-bottom:0; }
  .text-block p.lead{ font-size:clamp(19px,2.4vw,23px); color:var(--ink); }

  .divider{ border-top:1px solid var(--line); }

  .process .label{ color:var(--red); }

  .process .count{ display:flex; gap:.45em; font-family:var(--display); font-size:clamp(13px,1.8vw,16px); letter-spacing:.18em; color:var(--red); margin-bottom:18px; }
  .process p{ font-size:clamp(16px,2vw,18px); line-height:1.7; color:#D9D4C8; max-width:680px; margin-bottom:16px; }
  .process p:last-child{ margin-bottom:0; color:#fff; font-style:italic; }

  /* EARLY ACCESS */
  .early{ background:var(--paper2); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .early-inner{ text-align:center; max-width:680px; margin:0 auto; }

  .early h2 .ul{ position:absolute; left:-3%; right:-3%; bottom:-.1em; width:106%; height:.2em; }
  .early .tag{ font-size:clamp(18px,2.4vw,22px); margin-top:18px; }
  .early p{ font-size:clamp(15px,1.9vw,17px); color:var(--mut); margin-top:14px; line-height:1.65; }
  .early-cta{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:30px; }
  .early-note{ font-size:13px; color:var(--mut); font-style:italic; margin-top:16px; }

  /* VALUES (dark) */
  .values{ background:var(--ink); color:var(--paper); }
  .values .sec-label{ color:var(--red); }
  .values-intro{ font-size:clamp(19px,2.6vw,25px); max-width:680px; margin-top:-8px; margin-bottom:clamp(28px,4vw,46px); color:#EFEBE0; }
  .values-grid{ display:grid; grid-template-columns:1fr; gap:clamp(26px,3.5vw,44px); }
  @media (min-width:760px){ .values-grid{ grid-template-columns:1fr 1fr; gap:clamp(30px,3vw,56px) clamp(40px,5vw,80px); } }
  .value{ display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; }
  .value .num{ font-family:var(--display); font-size:clamp(30px,4vw,46px); color:var(--red); line-height:.9; }
  .value h3{ font-family:var(--serif); font-weight:800; font-size:clamp(16px,2vw,19px); letter-spacing:.04em; text-transform:uppercase; line-height:1.2; margin-bottom:9px; }
  .value p{ font-size:16px; line-height:1.55; color:#D9D4C8; }

  /* FOOTER (dark) */
  footer{ background:var(--ink2); color:var(--paper); border-top:1px solid #2A2722; }
  .foot-grid{ display:grid; grid-template-columns:1fr; gap:36px; padding:clamp(44px,6vw,76px) 0 clamp(26px,3vw,40px); }
  @media (min-width:720px){ .foot-grid{ grid-template-columns:1.4fr 1fr 1fr; } }
  .foot-brand img{ width:54px; height:54px; }
  .foot-brand .wm{ font-family:var(--display); font-size:34px; letter-spacing:.04em; margin-top:10px; }
  .foot-brand .tag{ font-family:var(--hand); color:#D9D4C8; margin-top:8px; font-size:15px; }
  .foot-brand .claim{ font-family:var(--display); font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--red); margin-top:10px; }
  .foot-col h4{ font-family:var(--serif); font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--red); margin-bottom:16px; }
  .foot-col a, .foot-col p{ display:block; color:#D9D4C8; font-size:15px; margin-bottom:11px; }
  .foot-col a:hover{ color:#fff; }
  .foot-bottom{ border-top:1px solid #2A2722; padding:18px 0; font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.06em; color:#8A857A; text-align:center; }

  /* FLOATING WA */
  .wa-float{ position:fixed; right:18px; bottom:18px; z-index:80; width:56px; height:56px; border-radius:50%; background:#25D366; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.25); transition:transform .15s; }
  .wa-float:hover{ transform:scale(1.06); }
  .wa-float svg{ width:30px; height:30px; fill:#fff; }

  /* MENU DRAWER */
  .overlay{ position:fixed; inset:0; background:rgba(19,17,15,.55); z-index:90; opacity:0; pointer-events:none; transition:opacity .25s; }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{ position:fixed; top:0; left:0; height:100%; width:min(360px,86%); z-index:100; background:var(--paper); border-right:1px solid var(--line); display:flex; flex-direction:column; transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.1,1); }
  .drawer.open{ transform:translateX(0); }
  .drawer-head{ display:flex; align-items:center; justify-content:space-between; padding:18px var(--space); border-bottom:1px solid var(--line); }
  .drawer-head .dt{ font-family:var(--display); font-size:22px; letter-spacing:.04em; }
  .x-btn{ background:none; border:none; font-size:26px; cursor:pointer; color:var(--ink); line-height:1; }
  .menu-nav{ padding:14px var(--space); display:flex; flex-direction:column; }
  .menu-nav a{ font-family:var(--serif); font-weight:800; font-size:20px; letter-spacing:-.01em; text-transform:uppercase; padding:13px 0; border-bottom:1px solid var(--line); }
  .menu-nav a:hover{ color:var(--red); }
  .menu-nav a.toko-link{ color:var(--red); }

  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; scroll-behavior:auto; } .reveal{ opacity:1; transform:none; } }
  :focus-visible{ outline:3px solid var(--red); outline-offset:2px; }

function waLink(text){ return "https://wa.me/" + CONFIG.waNumber + "?text=" + encodeURIComponent(text); }
function paras(arr){ return arr.map(p => `<p>${p}</p>`).join(""); }

function applyConfig(){
  document.getElementById("ticker").innerHTML =
    ("<span>" + CONFIG.ticker.replaceAll("·","<b>·</b>") + " &nbsp;&nbsp;</span>").repeat(2);

  document.getElementById("hero-eyebrow").textContent = CONFIG.heroEyebrow;
  document.getElementById("hero-headline").textContent = CONFIG.heroHeadline;
  document.getElementById("hero-claim").textContent = CONFIG.heroClaim;
  document.getElementById("hero-sub").textContent = CONFIG.heroSub;

  document.getElementById("built-label").textContent = CONFIG.builtLabel;
  document.getElementById("built-content").innerHTML = paras(CONFIG.builtParagraphs);

  document.getElementById("why-label").textContent = CONFIG.whyLabel;
  document.getElementById("why-content").innerHTML = paras(CONFIG.whyParagraphs);

  document.getElementById("process-count").innerHTML = CONFIG.processCount.map(c=>`<span>${c}</span>`).join("");
  document.getElementById("process-title").textContent = CONFIG.processTitle;
  document.getElementById("process-content").innerHTML =
    CONFIG.processParagraphs.map(p => `<p class="reveal">${p}</p>`).join("");

  document.getElementById("early-title").textContent = CONFIG.earlyTitle;
  document.getElementById("early-tag").textContent = CONFIG.earlyTag;
  document.getElementById("early-content").innerHTML = paras(CONFIG.earlyParagraphs);
  const efb = document.getElementById("early-form-btn"); efb.href = CONFIG.earlyFormUrl;
  const ewb = document.getElementById("early-wa-btn"); ewb.href = waLink("Halo MORFODANS! Saya mau ikut Early Access.");
  document.getElementById("early-note").textContent = CONFIG.earlyNote;

  document.getElementById("values-label").textContent = CONFIG.valuesLabel;
  document.getElementById("values-intro").textContent = CONFIG.valuesIntro;
  document.getElementById("values-grid").innerHTML = CONFIG.values.map((v,i) => `
    <div class="value reveal">
      <div class="num">${String(i+1).padStart(2,"0")}</div>
      <div><h3>${v.t}</h3><p>${v.d}</p></div>
    </div>`).join("");

  document.getElementById("menu-nav").innerHTML =
    CONFIG.navLinks.map(l => `<a href="${l.href}" onclick="closeMenu()">${l.label}</a>`).join("") +
    `<a class="toko-link" href="toko.html">Lihat Toko →</a>`;

  document.getElementById("foot-tag").textContent = CONFIG.footerTagline;
  document.getElementById("foot-claim").textContent = CONFIG.footerClaim;
  const fw = document.getElementById("foot-wa"); fw.textContent = "WhatsApp"; fw.href = waLink("Halo MORFODANS!");
  const fi = document.getElementById("foot-ig"); fi.textContent = "Instagram " + CONFIG.igHandle; fi.href = CONFIG.igUrl;
  const ft = document.getElementById("foot-tiktok"); ft.textContent = "TikTok " + CONFIG.tiktokHandle; ft.href = CONFIG.tiktokUrl;
  document.getElementById("foot-copy").textContent = CONFIG.copyright;

  document.getElementById("wa-float").href = waLink("Halo MORFODANS! Saya mau tanya.");
}

function openMenu(){ document.getElementById("menu").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
function closeMenu(){ document.getElementById("menu").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }
function closeAll(){ closeMenu(); }

let _io;
function observeReveals(){
  if(!("IntersectionObserver" in window)){ document.querySelectorAll(".reveal").forEach(e=>e.classList.add("in")); return; }
  if(!_io){ _io=new IntersectionObserver((es)=>{ es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); _io.unobserve(en.target);} }); }, {threshold:.12}); }
  document.querySelectorAll(".reveal:not(.in)").forEach(e=>_io.observe(e));
}

applyConfig();
observeReveals();
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeAll(); });
