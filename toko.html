<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MORFODANS™ — by dancer for dancer</title>
<meta name="description" content="MORFODANS — pakaian yang dirancang dari tubuh penari, untuk tubuh penari. By dancer, for dancer." />
<link rel="icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F6F3EC;
    --paper2:#EFEBE0;
    --ink:#13110F;
    --ink2:#1C1A17;
    --red:#FF0000;
    --red-deep:#CC0000;
    --mut:#6F6B62;
    --line:#E0D9CC;
    --space:clamp(20px,5.5vw,80px);
    --maxw:1200px;
    --display:"Anton", Impact, sans-serif;
    --serif:"Archivo", system-ui, sans-serif;
    --hand:"Permanent Marker", cursive;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; overflow-x:clip; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--serif); font-size:17px; line-height:1.55;
    -webkit-font-smoothing:antialiased; overflow-x:clip;
  }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:var(--maxw); margin:0 auto; padding-left:var(--space); padding-right:var(--space); }
  .disp{ font-family:var(--display); font-weight:400; letter-spacing:.01em; line-height:.9; text-transform:uppercase; }
  .label{ font-family:var(--serif); font-weight:800; font-size:clamp(12px,1.5vw,14px); letter-spacing:.14em; text-transform:uppercase; color:var(--red); }

  /* hand-drawn marks */
  .mark{ position:absolute; pointer-events:none; overflow:visible; }
  .mark path{ fill:none; stroke:var(--red); stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; }

  /* reveal */
  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:none; }

  /* ---------- TICKER ---------- */
  .ticker{ background:var(--ink); overflow:hidden; white-space:nowrap; }
  .ticker-track{ display:inline-block; padding:8px 0; animation:scroll 32s linear infinite; }
  .ticker-track span{ font-family:var(--serif); font-weight:700; font-size:11px; letter-spacing:.1em; color:var(--paper); padding:0 14px; }
  .ticker-track span b{ color:var(--red); }
  @keyframes scroll{ from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* ---------- HEADER ---------- */
  header{ position:sticky; top:0; z-index:70; background:rgba(246,243,236,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .head-in{ display:flex; align-items:center; justify-content:space-between; height:62px; }
  .h-left, .h-right{ flex:1; display:flex; align-items:center; gap:14px; }
  .h-right{ justify-content:flex-end; }
  .icon-btn{ background:none; border:none; cursor:pointer; color:var(--ink); display:flex; align-items:center; padding:6px; }
  .icon-btn svg{ width:24px; height:24px; }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand img{ width:32px; height:32px; }
  .brand .wm{ font-family:var(--serif); font-weight:800; font-size:18px; letter-spacing:-.01em; text-transform:uppercase; color:var(--ink); line-height:1; }
  .bag-count{ position:absolute; top:-6px; right:-8px; background:var(--red); color:#fff; font-family:var(--serif); font-weight:700; font-size:10px; min-width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .bag-wrap{ position:relative; }

  /* ---------- HERO ---------- */
  .hero{ padding:clamp(52px,9vw,120px) 0 clamp(44px,7vw,96px); position:relative; }
  .hero-grid{ display:grid; grid-template-columns:1fr; gap:30px; align-items:center; }
  .hero-eyebrow{ font-family:var(--hand); font-size:clamp(18px,3.5vw,28px); color:var(--red); margin-bottom:14px; }
  .hero h1{ font-family:var(--display); font-size:clamp(50px,12vw,170px); line-height:.84; letter-spacing:.005em; text-transform:uppercase; position:relative; display:inline-block; }
  .hero h1 .ul{ position:absolute; left:-2%; right:-2%; bottom:-.12em; width:104%; height:.22em; }
  .hero-sub{ font-size:clamp(17px,2.3vw,22px); color:var(--ink); max-width:34ch; margin-top:26px; }
  .hero-cta{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-top:32px; }
  .btn{ font-family:var(--serif); font-weight:700; font-size:13px; letter-spacing:.06em; text-transform:uppercase; padding:14px 26px; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:9px; transition:transform .15s, background .15s, color .15s; }
  .btn-red{ background:var(--red); color:#fff; }
  .btn-red:hover{ background:var(--red-deep); }
  .btn-ink{ background:var(--ink); color:var(--paper); }
  .btn-ink:hover{ background:var(--ink2); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--ink); }
  .btn-ghost:hover{ background:var(--ink); color:var(--paper); }
  .hero-logo{ width:clamp(120px,16vw,168px); height:auto; justify-self:start; }
  @media (min-width:860px){
    .hero-grid{ grid-template-columns:1.5fr .8fr; }
    .hero-logo{ justify-self:end; }
  }

  /* ---------- SECTION ---------- */
  section{ position:relative; }
  .sec-pad{ padding:clamp(48px,8vw,104px) 0; }
  .sec-label{ position:relative; display:inline-block; margin-bottom:clamp(22px,3.5vw,38px); }
  .sec-label .ul{ position:absolute; left:0; bottom:-12px; width:108%; height:14px; }

  /* about */
  .about-text{ font-size:clamp(19px,2.7vw,27px); line-height:1.5; max-width:24ch; }
  .about-text{ max-width:760px; }
  .about-text b{ font-weight:600; }
  .chips{ display:flex; flex-wrap:wrap; gap:10px; margin-top:30px; }
  .chip{ font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase; border:1.5px solid var(--line); color:var(--mut); padding:9px 16px; display:inline-flex; align-items:center; gap:8px; }
  .chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--red); opacity:.55; }

  /* shop / warming up */
  .shop{ border-top:1px solid var(--line); }
  .warmup{ text-align:center; padding:clamp(30px,6vw,70px) 0 clamp(20px,3vw,40px); position:relative; }
  .warmup-mark{ position:relative; display:inline-block; padding:18px 40px; }
  .warmup-mark .disp{ font-size:clamp(64px,15vw,150px); color:var(--ink); position:relative; z-index:1; }
  .warmup-mark .mark{ left:-6%; top:-8%; width:112%; height:120%; }
  .warmup p{ font-size:clamp(16px,2.2vw,20px); color:var(--mut); max-width:42ch; margin:8px auto 0; }
  .warmup-cta{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:30px; }

  /* product grid (siap dipakai saat ada produk) */
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:clamp(14px,2.5vw,28px); }
  @media (min-width:780px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .card{ display:flex; flex-direction:column; }
  .card-media{ position:relative; aspect-ratio:4/5; background:var(--paper2); overflow:hidden; }
  .card-media img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s ease; }
  .card:hover .card-media img{ transform:scale(1.04); }
  .save-badge{ position:absolute; top:12px; left:12px; font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.03em; color:#fff; background:var(--red); padding:4px 10px; }
  .card-tag{ position:absolute; top:12px; right:12px; font-family:var(--hand); font-size:14px; color:var(--ink); background:var(--paper); padding:2px 9px; }
  .card-body{ padding:14px 2px; }
  .card-name{ font-family:var(--serif); font-weight:700; font-size:clamp(15px,2vw,18px); letter-spacing:-.01em; line-height:1.15; text-transform:uppercase; }
  .card-price{ display:flex; align-items:baseline; gap:10px; margin-top:6px; font-family:var(--serif); font-weight:800; }
  .price-now{ font-weight:800; font-size:19px; color:var(--ink); }
  .price-old{ position:relative; font-weight:600; font-size:15px; color:var(--mut); }
  .price-old .mark{ left:-4%; top:35%; width:108%; height:30%; }
  .sizes{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .size{ font-family:var(--serif); font-weight:600; font-size:12px; letter-spacing:.02em; border:1.5px solid var(--ink); background:transparent; color:var(--ink); padding:6px 11px; min-width:34px; cursor:pointer; transition:background .12s,color .12s; }
  .size:hover{ background:var(--ink); color:var(--paper); }
  .size.active{ background:var(--red); color:#fff; border-color:var(--red); }
  .size.soldout{ opacity:.3; text-decoration:line-through; cursor:not-allowed; }
  .add{ margin-top:12px; width:100%; border:none; background:var(--ink); color:var(--paper); font-family:var(--serif); font-weight:700; font-size:13px; letter-spacing:.05em; text-transform:uppercase; padding:13px; cursor:pointer; transition:background .15s; }
  .add:hover{ background:var(--red); }
  .hint{ font-family:var(--serif); font-weight:600; font-size:11px; letter-spacing:.02em; color:var(--red); min-height:15px; margin-top:6px; }

  /* ---------- VALUES (dark) ---------- */
  .values{ background:var(--ink); color:var(--paper); }
  .values .sec-label{ color:var(--red); }
  .values-grid{ display:grid; grid-template-columns:1fr; gap:clamp(26px,3.5vw,44px); margin-top:8px; }
  @media (min-width:760px){ .values-grid{ grid-template-columns:1fr 1fr; gap:clamp(30px,3vw,56px) clamp(40px,5vw,80px); } }
  .value{ display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; }
  .value .num{ font-family:var(--display); font-size:clamp(30px,4vw,46px); color:var(--red); line-height:.9; }
  .value h3{ font-family:var(--serif); font-weight:800; font-size:clamp(17px,2.2vw,21px); letter-spacing:-.01em; text-transform:uppercase; line-height:1.1; margin-bottom:9px; }
  .value p{ font-size:16px; line-height:1.55; color:#D9D4C8; }

  /* ---------- FOOTER (dark) ---------- */
  footer{ background:var(--ink2); color:var(--paper); border-top:1px solid #2A2722; }
  .foot-grid{ display:grid; grid-template-columns:1fr; gap:36px; padding:clamp(44px,6vw,76px) 0 clamp(26px,3vw,40px); }
  @media (min-width:720px){ .foot-grid{ grid-template-columns:1.4fr 1fr 1fr; } }
  .foot-brand img{ width:54px; height:54px; }
  .foot-brand .wm{ font-family:var(--display); font-size:34px; letter-spacing:.04em; margin-top:10px; }
  .foot-brand .tag{ font-style:italic; color:#B9B4A8; margin-top:6px; }
  .foot-col h4{ font-family:var(--serif); font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--red); margin-bottom:16px; }
  .foot-col a, .foot-col p{ display:block; color:#D9D4C8; font-size:15px; margin-bottom:11px; }
  .foot-col a:hover{ color:#fff; }
  .socials{ display:flex; gap:14px; margin-top:2px; }
  .socials a{ display:flex; }
  .socials svg{ width:22px; height:22px; }
  .foot-bottom{ border-top:1px solid #2A2722; padding:18px 0; font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.06em; color:#8A857A; text-align:center; }

  /* ---------- FLOATING WA ---------- */
  .wa-float{ position:fixed; right:18px; bottom:18px; z-index:80; width:56px; height:56px; border-radius:50%; background:#25D366; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.25); transition:transform .15s; }
  .wa-float:hover{ transform:scale(1.06); }
  .wa-float svg{ width:30px; height:30px; fill:#fff; }

  /* ---------- DRAWERS ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(19,17,15,.55); z-index:90; opacity:0; pointer-events:none; transition:opacity .25s; }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{ position:fixed; top:0; height:100%; z-index:100; background:var(--paper); display:flex; flex-direction:column; transition:transform .3s cubic-bezier(.4,0,.1,1); }
  .menu-drawer{ left:0; width:min(360px,86%); border-right:1px solid var(--line); transform:translateX(-100%); }
  .menu-drawer.open{ transform:translateX(0); }
  .cart-drawer{ right:0; width:min(410px,100%); border-left:3px solid var(--red); transform:translateX(100%); }
  .cart-drawer.open{ transform:translateX(0); }
  .drawer-head{ display:flex; align-items:center; justify-content:space-between; padding:18px var(--space); border-bottom:1px solid var(--line); }
  .drawer-head .dt{ font-family:var(--display); font-size:22px; letter-spacing:.04em; }
  .x-btn{ background:none; border:none; font-size:26px; cursor:pointer; color:var(--ink); line-height:1; }
  .menu-nav{ padding:14px var(--space); display:flex; flex-direction:column; }
  .menu-nav a{ font-family:var(--serif); font-weight:800; font-size:20px; letter-spacing:-.01em; text-transform:uppercase; padding:13px 0; border-bottom:1px solid var(--line); }
  .menu-nav a:hover{ color:var(--red); }
  .menu-cat{ padding:22px var(--space); }
  .menu-cat .ct{ font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut); margin-bottom:12px; }
  .menu-cat .soon{ display:inline-block; font-family:var(--serif); font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--red); border:1.5px dashed var(--red); padding:7px 14px; }

  /* cart body */
  .cart-body{ flex:1; overflow-y:auto; padding:6px var(--space); }
  .cart-empty{ font-style:italic; color:var(--mut); text-align:center; padding:60px 10px; font-size:17px; }
  .line{ display:flex; gap:12px; padding:16px 0; border-bottom:1px solid var(--line); }
  .line-name{ font-family:var(--serif); font-weight:700; font-size:14px; letter-spacing:-.01em; text-transform:uppercase; }
  .line-meta{ font-size:13px; color:var(--mut); font-style:italic; margin-top:2px; }
  .line-price{ font-family:var(--serif); font-weight:800; font-size:14px; color:var(--ink); margin-top:5px; }
  .qty{ display:flex; align-items:center; margin-top:8px; }
  .qty button{ width:27px; height:27px; border:1.5px solid var(--ink); background:none; cursor:pointer; font-size:15px; line-height:1; }
  .qty span{ width:34px; text-align:center; font-family:var(--serif); font-weight:700; font-size:14px; }
  .line-rm{ background:none; border:none; font-family:var(--serif); font-weight:600; font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--mut); cursor:pointer; align-self:flex-start; }
  .line-rm:hover{ color:var(--red); }
  .cart-foot{ border-top:1px solid var(--line); padding:18px var(--space); }
  .total-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; font-family:var(--serif); }
  .total-row .tl{ font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--mut); }
  .total-row .tv{ font-weight:800; font-size:22px; color:var(--ink); }
  .checkout{ width:100%; border:none; background:var(--red); color:#fff; font-family:var(--serif); font-weight:700; font-size:14px; letter-spacing:.05em; text-transform:uppercase; padding:15px; cursor:pointer; }
  .checkout:hover{ background:var(--red-deep); }
  .checkout:disabled{ background:var(--line); color:var(--mut); cursor:not-allowed; }
  .cart-note{ font-size:12px; font-style:italic; color:var(--mut); text-align:center; margin-top:10px; line-height:1.5; }

  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; scroll-behavior:auto; } .reveal{ opacity:1; transform:none; } }
  :focus-visible{ outline:3px solid var(--red); outline-offset:2px; }
</style>
</head>
<body id="top">

  <!-- TICKER -->
  <div class="ticker" aria-hidden="true"><div class="ticker-track" id="ticker"></div></div>

  <!-- HEADER -->
  <header>
    <div class="wrap head-in">
      <div class="h-left">
        <button class="icon-btn" onclick="openMenu()" aria-label="Buka menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <a href="#top" class="brand">
        <img src="logo.png" alt="MORFODANS" />
        <span class="wm">MORFODANS</span>
      </a>
      <div class="h-right">
        <button class="icon-btn bag-wrap" onclick="openCart()" aria-label="Keranjang">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="bag-count" id="bag-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="wrap hero-grid">
      <div>
        <p class="hero-eyebrow" id="hero-eyebrow"></p>
        <h1 class="disp">
          <span id="hero-headline"></span>
          <svg class="mark ul" viewBox="0 0 600 26" preserveAspectRatio="none"><path d="M8 16 C 140 6 280 22 420 12 C 500 6 560 16 592 13"/></svg>
        </h1>
        <p class="hero-sub" id="hero-sub"></p>
        <div class="hero-cta">
          <a class="btn btn-red" id="hero-cta" target="_blank" rel="noopener"></a>
          <a class="btn btn-ghost" href="#shop">Lihat koleksi</a>
        </div>
      </div>
      <img class="hero-logo reveal" src="logo.png" alt="MORFODANS" />
    </div>
  </section>

  <!-- ABOUT (#2) -->
  <section class="sec-pad" id="about">
    <div class="wrap">
      <span class="label sec-label reveal">
        <span id="about-label"></span>
        <svg class="mark ul" viewBox="0 0 300 16" preserveAspectRatio="none"><path d="M5 9 C 70 3 120 14 180 8 C 240 3 280 12 296 8"/></svg>
      </span>
      <p class="about-text reveal" id="about-text"></p>
      <div class="chips reveal" id="about-chips"></div>
    </div>
  </section>

  <!-- SHOP (#9) -->
  <section class="sec-pad shop" id="shop">
    <div class="wrap">
      <span class="label sec-label reveal">
        <span id="shop-label"></span>
        <svg class="mark ul" viewBox="0 0 200 16" preserveAspectRatio="none"><path d="M5 9 C 50 3 90 14 130 8 C 165 4 188 11 196 8"/></svg>
      </span>
      <div id="shop-content"></div>
    </div>
  </section>

  <!-- VALUES (#1) -->
  <section class="sec-pad values" id="values">
    <div class="wrap">
      <span class="label sec-label reveal" id="values-label"></span>
      <div class="values-grid" id="values-grid"></div>
    </div>
  </section>

  <!-- FOOTER (#8) -->
  <footer id="footer">
    <div class="wrap">
      <div class="foot-grid">
        <div class="foot-brand">
          <img src="logo.png" alt="MORFODANS" />
          <div class="wm">MORFODANS™</div>
          <div class="tag" id="foot-tag"></div>
        </div>
        <div class="foot-col">
          <h4>Kontak</h4>
          <a id="foot-wa" target="_blank" rel="noopener"></a>
          <a id="foot-email"></a>
          <p id="foot-loc"></p>
        </div>
        <div class="foot-col">
          <h4>Ikuti</h4>
          <a id="foot-ig" target="_blank" rel="noopener"></a>
          <a id="foot-tiktok" target="_blank" rel="noopener"></a>
          <div class="socials" id="foot-socials"></div>
        </div>
      </div>
    </div>
    <div class="foot-bottom" id="foot-copy"></div>
  </footer>

  <!-- FLOATING WA -->
  <a class="wa-float" id="wa-float" target="_blank" rel="noopener" aria-label="Chat WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.578-1.255zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
  </a>

  <!-- MENU DRAWER (#5) -->
  <aside class="drawer menu-drawer" id="menu" aria-label="Menu">
    <div class="drawer-head">
      <span class="dt">Menu</span>

<script>
/* =================================================================

const CONFIG = {

  // Chip kategori di bawah deskripsi (masih WARMING UP sampai kamu putuskan)

  // SHOP
  shopLabel: "SHOP",

  shopNote: "Koleksi pertama sedang dipanaskan. Drop perdana segera — pantau lewat Instagram & WhatsApp.",

  // NILAI (sebelum footer)
  valuesLabel: "WHAT WE STAND FOR",
  values: [
    { t: "Dibuat khusus untuk penari", d: "Tubuh penari punya kebutuhan yang berbeda dari atlet atau pengguna gym. Kami merancang setiap produk dengan kebutuhan itu sebagai titik awal." },
    { t: "Kualitas", d: "Kami membuat produk sebaik yang kami bisa, dan tidak menurunkan mutunya hanya supaya terlihat lebih murah. Kualitas yang baik seharusnya bisa dijangkau setiap penari." },
    { t: "Jujur soal produk", d: "Kami hanya menyampaikan hal yang bisa kami buktikan. Bahan, jahitan, dan daya tahannya kami uji lebih dulu sebelum kami ceritakan." },
    { t: "Tumbuh bersama komunitas", d: "MORFODANS tumbuh dari komunitas tari, dan kami ingin ikut menjaganya. Sebagian hasil penjualan kami kembalikan untuk mendukung kegiatan dan ruang berkarya penari." },
    { t: "Tetap fokus", d: "Kami memilih melayani penari dengan baik daripada melebar ke mana-mana. Menjaga fokus adalah cara kami menjaga alasan MORFODANS ada." },
    { t: "Riset langsung", d: "Produk kami tumbuh dari pengamatan dan keterlibatan langsung di komunitas tari — bukan dari tren industri atau meniru merek lain." }
  ],

  // MENU (kiri)
  navLinks: [
    { label: "Beranda", href: "#top" },
    { label: "Shop", href: "#shop" },
    { label: "Nilai Kami", href: "#values" },
    { label: "Kontak", href: "#footer" },
    { label: "Early Access ↗", href: "index.html" }
  ],

  // FOOTER
  footerTagline: "by dancer · for dancer",
  igHandle: "@morfodans_fit",
  igUrl: "https://instagram.com/morfodans_fit",
  tiktokHandle: "@morfodans.fitfordancer",
  tiktokUrl: "https://tiktok.com/@morfodans.fitfordancer",
  email: "morfo.dans@gmail.com",
  location: "Trenggalek, East Java",
  copyright: "2026 © MORFODANS"
};

/* -----------------------------------------------------------------
   DAFTAR PRODUK — sekarang KOSONG (WARMING UP).
   Saat siap menambah produk, isi blok seperti contoh di dalam tanda
   /* ... */ /* di bawah. Begitu ada isi, halaman Shop otomatis berubah
   dari "WARMING UP" jadi grid produk.

   Contoh format 1 produk:
   { id:"001", name:"Nama Produk", price:199000, priceOld:0,
     sizes:["S","M","L"], soldout:[], tag:"new", img:"" }
   - price     : harga jual (angka saja, tanpa titik/Rp)
   - priceOld  : harga sebelum diskon. Isi 0 kalau TIDAK diskon.
                 (kalau diisi, harga dicoret + badge "Save X%" muncul otomatis)
   - sizes     : ["One Size"] kalau satu ukuran
   - soldout   : ukuran habis, mis. ["S","M"]. Kosong: []
   - tag       : label kecil ("new"/"limited"). Kosong: ""
   - img       : nama file foto, mis. "produk.jpg". Kosong "" = placeholder
   ----------------------------------------------------------------- */

const PRODUCTS = [
  // (kosong dulu — tambah produk di sini nanti)
];

/* =================================================================
   ╔════════════════════════════════════════════════════════════╗
   ║   DI BAWAH INI MESIN WEBSITE — SEBAIKNYA JANGAN DIUBAH       ║
   ╚════════════════════════════════════════════════════════════╝
   ================================================================= */

const cart = [];
const selectedSize = {};
const HAND_STRIKE = '<svg class="mark" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="M4 13 C 30 7 60 15 96 8"/></svg>';
const HAND_CIRCLE = '<svg class="mark" viewBox="0 0 520 200" preserveAspectRatio="none"><path d="M262 16 C150 10 40 44 44 100 C48 158 200 188 322 182 C452 176 500 120 482 74 C466 34 360 14 226 22"/></svg>';

function rupiah(n){ if(!n||n<=0) return "Rp \u2014"; return "Rp " + n.toLocaleString("id-ID"); }
function waLink(text){ return "https://wa.me/" + CONFIG.waNumber + "?text=" + encodeURIComponent(text); }

function applyConfig(){
  // ticker
  document.getElementById("ticker").innerHTML =
    ("<span>" + CONFIG.ticker.replaceAll("·","<b>·</b>") + " &nbsp;&nbsp;</span>").repeat(2);
  // hero
  document.getElementById("hero-eyebrow").textContent = CONFIG.heroEyebrow;
  document.getElementById("hero-headline").textContent = CONFIG.heroHeadline;
  document.getElementById("hero-sub").textContent = CONFIG.heroSub;
  const hc = document.getElementById("hero-cta"); hc.textContent = CONFIG.heroCtaLabel; hc.href = CONFIG.igUrl;
  // about
  document.getElementById("about-label").textContent = CONFIG.aboutLabel;
  document.getElementById("about-text").textContent = CONFIG.aboutText;
  document.getElementById("about-chips").innerHTML =
    CONFIG.aboutChips.map(c => `<span class="chip"><span class="dot"></span>${c}</span>`).join("");
  // shop label
  document.getElementById("shop-label").textContent = CONFIG.shopLabel;
  // values
  document.getElementById("values-label").textContent = CONFIG.valuesLabel;
  document.getElementById("values-grid").innerHTML = CONFIG.values.map((v,i) => `
    <div class="value reveal">
      <div class="num">${String(i+1).padStart(2,"0")}</div>
      <div><h3>${v.t}</h3><p>${v.d}</p></div>
    </div>`).join("");
  // menu
  document.getElementById("menu-nav").innerHTML =
    CONFIG.navLinks.map(l => `<a href="${l.href}" onclick="closeMenu()">${l.label}</a>`).join("");
  document.getElementById("menu-soon").textContent = CONFIG.comingSoon;
  // footer
  document.getElementById("foot-tag").textContent = CONFIG.footerTagline;
  const fw = document.getElementById("foot-wa"); fw.textContent = "WhatsApp"; fw.href = waLink("Halo MORFODANS!");
  const fe = document.getElementById("foot-email"); fe.textContent = CONFIG.email; fe.href = "mailto:" + CONFIG.email;
  document.getElementById("foot-loc").textContent = CONFIG.location;
  const fi = document.getElementById("foot-ig"); fi.textContent = "Instagram " + CONFIG.igHandle; fi.href = CONFIG.igUrl;
  const ft = document.getElementById("foot-tiktok"); ft.textContent = "TikTok " + CONFIG.tiktokHandle; ft.href = CONFIG.tiktokUrl;
  document.getElementById("foot-socials").innerHTML =
    `<a href="${CONFIG.igUrl}" target="_blank" rel="noopener" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="#D9D4C8" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#D9D4C8" stroke="none"/></svg></a>`+
    `<a href="${CONFIG.tiktokUrl}" target="_blank" rel="noopener" aria-label="TikTok"><svg viewBox="0 0 24 24" fill="#D9D4C8"><path d="M16 8.2a6.1 6.1 0 003.6 1.2V6.7a3.6 3.6 0 01-1.9-.6 3.6 3.6 0 01-1.7-3H11.4v11.2a2.1 2.1 0 11-2.1-2.1c.2 0 .4 0 .6.1V7.5a5 5 0 00-.6 0 5 5 0 105 5V8.7c.4.3.8.5 1.3.6z"/></svg></a>`;
  document.getElementById("foot-copy").textContent = CONFIG.copyright;
  // floating WA
  document.getElementById("wa-float").href = waLink("Halo MORFODANS! Saya mau tanya.");
}

function renderShop(){
  const el = document.getElementById("shop-content");
  if(!PRODUCTS.length){
    el.innerHTML = `
      <div class="warmup reveal">
        <div class="warmup-mark">
          <span class="disp">${CONFIG.comingSoon}</span>
          ${HAND_CIRCLE}
        </div>
        <p>${CONFIG.shopNote}</p>
        <div class="warmup-cta">
          <a class="btn btn-red" href="${CONFIG.igUrl}" target="_blank" rel="noopener">Ikuti Instagram</a>
          <a class="btn btn-ink" href="${waLink("Halo MORFODANS! Saya mau info drop perdana.")}" target="_blank" rel="noopener">Tanya via WhatsApp</a>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = `<div class="grid">` + PRODUCTS.map(p => {
    const one = p.sizes.length === 1; if(one) selectedSize[p.id] = p.sizes[0];
    const media = p.img ? `<img src="${p.img}" alt="${p.name}" loading="lazy">` : "";
    const save = (p.priceOld && p.priceOld > p.price)
      ? `<span class="save-badge">Save ${Math.round((1 - p.price/p.priceOld)*100)}%</span>` : "";
    const tag = p.tag ? `<span class="card-tag">${p.tag}</span>` : "";
    const oldPrice = (p.priceOld && p.priceOld > p.price)
      ? `<span class="price-old">${rupiah(p.priceOld)}${HAND_STRIKE}</span>` : "";
    const sizes = one ? `<span class="size active">${p.sizes[0]}</span>`
      : p.sizes.map(s => { const o=(p.soldout||[]).includes(s);
          return `<button class="size ${o?'soldout':''}" ${o?'disabled':''} onclick="pickSize('${p.id}','${s}',this)">${s}</button>`; }).join("");
    return `<article class="card reveal">
      <div class="card-media">${save}${tag}${media}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price"><span class="price-now">${rupiah(p.price)}</span>${oldPrice}</div>
        <div class="sizes">${sizes}</div>
        <div class="hint" id="hint-${p.id}"></div>
        <button class="add" onclick="addToCart('${p.id}')">+ Tambah ke keranjang</button>
      </div></article>`;
  }).join("") + `</div>`;
  observeReveals();
}

function pickSize(id,size,btn){
  selectedSize[id]=size;
  const card=btn.closest(".card"); card.querySelectorAll(".size").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active"); document.getElementById("hint-"+id).textContent="";
}
function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id); const size=selectedSize[id];
  if(!size){ document.getElementById("hint-"+id).textContent="↑ pilih ukuran dulu"; return; }
  const key=id+"__"+size; const f=cart.find(l=>l.key===key);
  if(f){ f.qty++; } else { cart.push({key,id,name:p.name,price:p.price,size,qty:1}); }
  renderCart(); openCart();
}
function changeQty(key,d){ const l=cart.find(x=>x.key===key); if(!l)return; l.qty+=d; if(l.qty<=0) cart.splice(cart.indexOf(l),1); renderCart(); }
function removeLine(key){ const i=cart.findIndex(x=>x.key===key); if(i>-1)cart.splice(i,1); renderCart(); }
function cartTotal(){ return cart.reduce((s,l)=>s+l.price*l.qty,0); }

function renderCart(){
  document.getElementById("bag-count").textContent = cart.reduce((n,l)=>n+l.qty,0);
  document.getElementById("cart-total").textContent = rupiah(cartTotal());
  const body=document.getElementById("cart-body"); const btn=document.getElementById("checkout-btn");
  if(!cart.length){ body.innerHTML=`<div class="cart-empty">Keranjang masih kosong.</div>`; btn.disabled=true; return; }
  btn.disabled=false;
  body.innerHTML = cart.map(l=>`
    <div class="line">
      <div style="flex:1">
        <div class="line-name">${l.name}</div>
        <div class="line-meta">Ukuran: ${l.size}</div>
        <div class="line-price">${rupiah(l.price)}</div>
        <div class="qty">
          <button onclick="changeQty('${l.key}',-1)" aria-label="Kurangi">−</button>
          <span>${l.qty}</span>
          <button onclick="changeQty('${l.key}',1)" aria-label="Tambah">+</button>
        </div>
      </div>
      <button class="line-rm" onclick="removeLine('${l.key}')">Hapus</button>
    </div>`).join("");
}
function checkout(){
  if(!cart.length) return;
  let m="Halo MORFODANS! \uD83D\uDC4B\nSaya mau pesan:\n\n";
  cart.forEach((l,i)=>{ const s=(l.size&&l.size!=="One Size")?" — Ukuran "+l.size:" — One Size";
    m+=(i+1)+". "+l.name+s+" (x"+l.qty+") — "+rupiah(l.price*l.qty)+"\n"; });
  m+="\nTotal: "+rupiah(cartTotal())+"\n\nMohon info ketersediaan stok (ready/pre-order), ongkir ke alamat saya, dan cara pembayaran. Terima kasih \uD83D\uDE4F";
  window.open(waLink(m),"_blank");
}

/* drawers */
function openMenu(){ document.getElementById("menu").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
function closeMenu(){ document.getElementById("menu").classList.remove("open"); maybeOverlay(); }
function openCart(){ document.getElementById("cart").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
function closeCart(){ document.getElementById("cart").classList.remove("open"); maybeOverlay(); }
function maybeOverlay(){ if(!document.querySelector(".drawer.open")) document.getElementById("overlay").classList.remove("open"); }
function closeAll(){ closeMenu(); closeCart(); }

/* reveal on scroll */
let _io;
function observeReveals(){
  if(!("IntersectionObserver" in window)){ document.querySelectorAll(".reveal").forEach(e=>e.classList.add("in")); return; }
  if(!_io){ _io=new IntersectionObserver((es)=>{ es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); _io.unobserve(en.target);} }); }, {threshold:.12}); }
  document.querySelectorAll(".reveal:not(.in)").forEach(e=>_io.observe(e));
}

applyConfig();
renderShop();
renderCart();
observeReveals();
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeAll(); });
</script>
